<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>DATA SENTINEL | SECURITY HUB</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00ff75; --s:#ff0055; --bg:#000; --blur:20px; }
body,html{ margin:0; background:#000; color:#fff; font-family:'JetBrains Mono'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.3; }

/* SECURITY HUD */
.sentinel-hud{ position:fixed; inset:0; z-index:100; padding:40px; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; }
.panel{ background:rgba(0,0,0,0.9); border:1px solid var(--p); padding:20px; pointer-events:all; backdrop-filter:blur(var(--blur)); box-shadow: 0 0 30px rgba(0,255,117,0.1); }
.threat-level{ font-family:'Orbitron'; font-size:24px; color:var(--p); letter-spacing:5px; margin-bottom:10px; }
.log-container{ height:200px; overflow:hidden; font-size:10px; color:var(--p); opacity:0.7; border-top:1px solid #222; margin-top:15px; padding-top:10px; }

/* SCANNER RADAR */
.radar-core{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:400px; height:400px; border:1px solid rgba(0,255,117,0.2); border-radius:50%; z-index:10; }
.radar-sweep{ position:absolute; inset:0; background:conic-gradient(from 0deg, var(--p) 0deg, transparent 90deg); border-radius:50%; animation: sweep 4s infinite linear; opacity:0.2; }
@keyframes sweep { from{ transform: rotate(0deg); } to{ transform: rotate(360deg); } }

.status-tag{ font-size:9px; background:var(--p); color:#000; padding:3px 10px; font-weight:900; margin-top:10px; display:inline-block; }
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='sentinel-hud'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='panel' style='width:350px;'>
            <div style='font-size:9px; opacity:0.5; letter-spacing:3px;'>PROTOCOL: DATA_SENTINEL_V140</div>
            <div class='threat-level' id='t-lvl'>STATUS: SECURE</div>
            <div style='font-size:11px;'>PACKET_INSPECTION: ACTIVE</div>
            <div class='status-tag'>FIREWALL_STATE: MAXIMUM</div>
        </div>
        <div class='panel' style='text-align:right;'>
            <div style='font-family:Orbitron; font-size:12px;'>ENCRYPTION_LAYER: 4096_BIT</div>
            <div style='font-size:10px; color:var(--p); margin-top:5px;'>UPLINK: SYNAPTIC_OVERLORD</div>
        </div>
    </div>

    <div class='panel' style='width:450px;'>
        <div style='font-family:Orbitron; font-size:10px; letter-spacing:3px;'>LIVE_THREAT_TELEMETRY</div>
        <div id='log' class='log-container'></div>
    </div>
</div>

<div class='radar-core'><div class='radar-sweep'></div></div>

<script>
const log = document.getElementById('log');
const tLvl = document.getElementById('t-lvl');
const reports = ["Filtering Inbound Quantum Packets...", "Neural Handshake with Overlord Verified", "No Unauthorized Intrusions Detected", "Optimizing Cryptographic Buffers", "Node Integrity: 100.00%", "Clearing Cache Segments"];

function addLog() {
    const d = document.createElement('div');
    d.innerText = `> [${new Date().toLocaleTimeString()}] ${reports[Math.floor(Math.random()*reports.length)]}`;
    log.prepend(d);
    if(log.children.length > 12) log.lastChild.remove();
    
    // Random threat simulation
    if(Math.random() > 0.95) {
        tLvl.innerText = "STATUS: ANALYZING"; tLvl.style.color = "#ffb800";
        setTimeout(() => { tLvl.innerText = "STATUS: SECURE"; tLvl.style.color = "#00ff75"; }, 2000);
    }
}
setInterval(addLog, 2500);

const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w,h,t=0; function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } res();
function draw(){
    t+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='rgba(0,255,117,0.1)';
    for(let i=0;i<w;i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
    for(let i=0;i<h;i+=50){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }
    requestAnimationFrame(draw);
} draw();
</script><script>
    async function syncWithOverlord() {
        const url = 'https://api.github.com/repos/1tmani/synaptic-overlord/contents/network_state.json';
        try {
            const resp = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3.raw' } });
            const state = await resp.json();
            if(state.energy_level === 'HIGH') {
                document.documentElement.style.setProperty('--speed', '0.5s');
            }
            if(state.global_hue) {
                document.documentElement.style.setProperty('--p', `hsl(${state.global_hue}, 100%, 50%)`);
            }
        } catch(e) { console.log('📡 Syncing...'); }
    }
    setInterval(syncWithOverlord, 5000); syncWithOverlord();
    </script></body></html>
