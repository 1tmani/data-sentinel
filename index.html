<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Data Sentinel</title>    <style>:root{--p:hsl(136,100%,50%);} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;}     canvas{position:fixed;inset:0;z-index:1;} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:5px;}    </style></head><body><div class='hud'>NODE: DATA SENTINEL<br>ROLE: SECURITY MONITOR<br>SYNC: ACTIVE</div><canvas id='c'></canvas>    <script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();    function draw(){t+=0.05;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.strokeRect(w/2-Math.sin(t)*100,h/2-Math.cos(t)*100,200,200);requestAnimationFrame(draw);}draw();</script></body></html>
